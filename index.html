<style>
:root{--primary:#1a56db;--primary-dark:#1e429f;--success:#16a34a;--warning:#d97706;--danger:#dc2626;--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--sidebar:#0f172a;--radius:8px;--shadow:0 1px 4px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;background:var(--sidebar);color:#cbd5e1;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo{padding:16px;border-bottom:1px solid rgba(255,255,255,.08)}

.nav-group{padding:10px 0 2px}
.nav-label{padding:4px 14px 5px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#475569;font-weight:600}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;font-size:13px;color:#94a3b8;border-left:3px solid transparent;user-select:none;transition:.1s}
.nav-item:hover{background:rgba(255,255,255,.05);color:#e2e8f0}
.nav-item.active{background:rgba(26,86,219,.2);color:#60a5fa;border-left-color:#1a56db}
.nav-item .ic{font-size:14px;width:18px;text-align:center}
.nbadge{background:#ef4444;color:#fff;border-radius:20px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:auto}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

#content{flex:1;overflow-y:auto;padding:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}

.btn-secondary{background:#fff;color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--bg)}

.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-warning{background:var(--warning);color:#fff}.btn-warning:hover{background:#b45309}

.bg-green{background:#dcfce7;color:#15803d}.bg-blue{background:#dbeafe;color:#1d4ed8}
.bg-yellow{background:#fef3c7;color:#b45309}.bg-red{background:#fee2e2;color:#b91c1c}
.bg-gray{background:#f1f5f9;color:#475569}.bg-purple{background:#f3e8ff;color:#7c3aed}
.bg-teal{background:#ccfbf1;color:#0f766e}.bg-orange{background:#ffedd5;color:#c2410c}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;background:#f8fafc;border-bottom:2px solid var(--border);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}

/* ── Responsive / Mobile ──────────────────────────────── */

  #menu-toggle{display:block}
  #main{flex:1;min-width:0;overflow:hidden}

  #topbar h2{font-size:14px}
  #topbar-actions{flex-wrap:wrap;gap:6px;width:100%}
  #content{padding:12px;overflow-x:hidden}
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .stat-card{padding:12px}
  .stat-value{font-size:20px}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .form-full{grid-column:1}
  .overlay{padding:6px;align-items:flex-end}
  .modal,.modal-lg,.modal-xl{width:calc(100vw - 12px)!important;max-width:calc(100vw - 12px)!important;border-radius:12px 12px 0 0;max-height:92vh;padding:16px;overflow-x:hidden}
  table{font-size:12px}
  th,td{padding:6px 8px}

  #scan-bar{width:130px!important}
  .chart-wrap{height:160px}
  .info-grid{grid-template-columns:1fr}
  .check-group{display:grid!important;grid-template-columns:1fr 1fr;gap:8px}

/* Small phones */
@media(max-width:480px){

.part-row input{flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px}
.part-row .btn-sm{flex-shrink:0}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px}

</style>

<script>
// ═══════════════════════════════════════════════════════
// DATABASE
// ═══════════════════════════════════════════════════════
// ── Supabase config ──────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://ppqvgaakacvubgqwdayi.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwcXZnYWFrYWN2dWJncXdkYXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MjU2ODIsImV4cCI6MjA5NzIwMTY4Mn0.Tu0IFoRdqALIXoxmvTKqTMui60zd5daKFXosrqKZgY8';
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const _TABLES = ['devices','repairs','inspections','reinspections','sales','parts','customers','employees','history'];
let _cache = {};  // in-memory mirror of Supabase tables

async function initSupabase(){
  setLoadingMsg('Loading data…', 30);
  for(let i=0;i<_TABLES.length;i++){
    const t=_TABLES[i];
    setLoadingMsg('Loading '+t+'…', 30 + Math.round((i/_TABLES.length)*60));
    const {data,error}=await _sb.from(t).select('id,data');
    if(error){console.error(t,error);_cache[t]=[];}
    else _cache[t]=(data||[]).map(r=>r.data);
  }
  setLoadingMsg('Ready!', 100);
}

function setLoadingMsg(msg,pct){
  const el=document.getElementById('loading-msg');
  const bar=document.getElementById('loading-bar');
  if(el)el.textContent=msg;
  if(bar)bar.style.width=pct+'%';
}

// ── DB layer (synchronous reads from cache, async writes to Supabase) ─────
const DB={
  get:(k)=>_cache[k]||[],
  set:(k,arr)=>{
    _cache[k]=arr;
    // Wipe + re-insert (used only by clearAllData)
    _sb.from(k).delete().neq('id','__never__').then(()=>{
      if(arr.length) _sb.from(k).insert(arr.map(d=>({id:d.id,data:d}))).then();
    });
  },
  all:(k)=>_cache[k]||[],
  find:(k,id)=>(_cache[k]||[]).find(i=>i.id===id),
  save:(k,item)=>{
    const a=_cache[k]||[];
    const i=a.findIndex(x=>x.id===item.id);
    if(i>=0){
      a[i]=item;
      _sb.from(k).update({data:item}).eq('id',item.id).then(r=>{if(r.error)console.error('save upd',r.error);});
    } else {
      a.push(item);
      _sb.from(k).insert({id:item.id,data:item}).then(r=>{if(r.error)console.error('save ins',r.error);});
    }
    _cache[k]=a;
    return item;
  },
  del:(k,id)=>{
    _cache[k]=(_cache[k]||[]).filter(i=>i.id!==id);
    _sb.from(k).delete().eq('id',id).then(r=>{if(r.error)console.error('del',r.error);});
  },
  newId:(pfx)=>{const ts=Date.now().toString().slice(-8);return pfx+'-'+ts+String(Math.floor(Math.random()*99)).padStart(2,'0')}
};

// ═══════════════════════════════════════════════════════
// BRAND → MODEL MAPPING

function getSession(){try{return JSON.parse(localStorage.getItem('itad2_session')||'null');}catch{return null;}}
function setSession(emp){localStorage.setItem('itad2_session',JSON.stringify({id:emp.id,name:emp.name,role:emp.role,loginAt:new Date().toISOString()}));}
function clearSession(){localStorage.removeItem('itad2_session');}

function applyRoleNav(role){
  document.querySelectorAll('.nav-item[data-roles]').forEach(el=>{
    const roles=el.getAttribute('data-roles').split(',');
    el.style.display=roles.includes(role)?'':'none';
  });
  const sess=getSession();
  if(sess){
    const nameEl=document.getElementById('sidebar-user-name');
    const roleEl=document.getElementById('sidebar-user-role');
    if(nameEl)nameEl.textContent=sess.name;
    if(roleEl){roleEl.textContent=sess.role;roleEl.style.color=ROLE_COLORS[sess.role]||'#64748b';}
  }
}

let _pendingEmpId=null;
function selectEmployee(empId){
  _pendingEmpId=empId;
  const emp=DB.find('employees',empId);if(!emp)return;
  document.getElementById('pin-area').style.display='block';
  document.getElementById('pin-for').innerHTML=`Enter PIN for <strong>${emp.name}</strong>`;
  document.getElementById('pin-error').style.display='none';
  document.getElementById('pin-input').value='';
  setTimeout(()=>document.getElementById('pin-input').focus(),50);
}
function confirmPin(){
  const emp=DB.find('employees',_pendingEmpId);if(!emp)return;
  const entered=(document.getElementById('pin-input').value||'').trim();
  if(entered!==emp.pin){
    document.getElementById('pin-error').style.display='block';
    document.getElementById('pin-input').value='';
    return;
  }
  setSession(emp);applyRoleNav(emp.role);closeModal();
  toast('Welcome, '+emp.name+'!');
  const allowed=ROLE_PAGES[emp.role]||['dashboard'];
  if(!allowed.includes(currentPage))nav(allowed[0]||'dashboard');
  else{const v={dashboard:renderDashboard,inspection:renderInspection,repair:renderRepair,reinspection:renderReinspection};if(v[currentPage])v[currentPage]();}
}

const fmt={
  date:(d)=>d?new Date(d.includes('T')?d:d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—',
  datetime:(d)=>d?new Date(d).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}):'—',
  money:(n)=>'$'+Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')
};
function modal(html){document.getElementById('modal-root').innerHTML=html}
function closeModal(){document.getElementById('modal-root').innerHTML=''}
function toast(msg,type='success'){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:22px;right:22px;z-index:999;padding:11px 18px;background:${type==='success'?'#16a34a':type==='warn'?'#d97706':'#dc2626'};color:#fff;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 4px 14px rgba(0,0,0,.25);transition:opacity .3s`;
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>t.style.opacity='0',2500);setTimeout(()=>t.remove(),3000);
}
function confirm2(msg,cb){
  modal(`<div class="overlay" onclick="closeModal()"><div class="modal" style="width:400px" onclick="event.stopPropagation()">
    <div class="modal-hdr"><h3>Confirm</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <p style="font-size:13px;margin-bottom:18px">${msg}</p>
    <div class="form-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    <button class="btn btn-danger" onclick="closeModal();(${cb.toString()})()">Confirm</button></div>
  </div></div>`);
}
function statusBadge(s){
  const m={'Inspection Queue':'bg-blue','In Repair':'bg-orange','Reinspection Queue':'bg-purple','Ready for Sale':'bg-green','For Parts':'bg-gray','Sold':'bg-teal','Received':'bg-yellow'};
  return`<span class="badge ${m[s]||'bg-gray'}">${s}</span>`;
}
function updateBadges(){
  const devices=DB.all('devices');
  const set=(id,count)=>{const el=document.getElementById('badge-'+id);if(el)el.textContent=count;};
  set('inspection',devices.filter(d=>d.status==='Inspection Queue').length);
  set('repair',devices.filter(d=>d.status==='In Repair').length);
  set('reinspection',devices.filter(d=>d.status==='Reinspection Queue').length);
}

function nav(page,params={}){
  // Role access check
  const sess=getSession();
  if(sess){
    const allowed=ROLE_PAGES[sess.role]||['dashboard'];
    if(!allowed.includes(page)){toast('Access not allowed for your role','error');return;}
  }
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const n=document.getElementById('nav-'+page);if(n)n.classList.add('active');
  const titles={dashboard:'Dashboard',reception:'Reception — Receive Device',inspection:'Inspection Queue',repair:'Repair Queue',reinspection:'Reinspection Queue',sale:'Ready for Sale',parts:'For Parts',sold:'Sold Devices',history:'Device History',customers:'Customer / Source Management',employees:'Employee Management',settings:'Settings'};
  document.getElementById('page-title').textContent=titles[page]||page;
  const views={dashboard:renderDashboard,reception:renderReception,inspection:renderInspection,repair:renderRepair,reinspection:renderReinspection,sale:renderSale,parts:renderParts,sold:renderSold,history:renderHistory,customers:renderCustomers,employees:renderEmployees,settings:renderSettings};
  if(views[page])views[page](params);
  updateBadges();
}

function exportCSV(){
  const devices=DB.all('devices');
  const headers=['ID','Source','CIT End User','CIT Contract','Category','Sub-Category','Brand','Model','Serial','Receiving Date','Condition','Accessories','Status','Total Cost','Sale Price','Received By','Received At'];
  const rows=devices.map(d=>[d.id,d.source,d.citEndUser||'',d.citContract||'',d.category,d.subCategory||'',d.brand,d.model,d.serial,d.receivingDate,d.condition,(d.accessories||[]).join(';'),d.status,d.totalCost||0,d.salePrice||0,d.receivedBy,d.receivedAt].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
  const csv=[headers.join(','),...rows].join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='ITAD-Export-'+new Date().toISOString().split('T')[0]+'.csv';a.click();
  toast('CSV exported');
}

function renderDashboard(){
  document.getElementById('topbar-actions').innerHTML=scanBarHTML()+`<button class="btn btn-secondary" onclick="exportCSV()">⬇ Export CSV</button>`;
  const devices=DB.all('devices');
  const repairs=DB.all('repairs');
  const sales=DB.all('sales');
  const totalRevenue=sales.reduce((a,s)=>a+(+s.salePrice||0),0);
  const totalCost=devices.reduce((a,d)=>a+(+d.totalCost||0),0);
  const repairCost=repairs.reduce((a,r)=>a+(r.parts||[]).reduce((s,p)=>s+(+p.cost||0),0)+(r.laborCostAdded?25:0),0);
  const grossProfit=totalRevenue-totalCost;
  const byStatus=(s)=>devices.filter(d=>d.status===s).length;
  const soldDevices=devices.filter(d=>d.status==='Sold');
  const avgRepairCost=repairs.length?repairCost/repairs.length:0;

  // Source profitability
  const sources=[...new Set(devices.map(d=>d.source))].filter(Boolean);
  const sourceData=sources.map(src=>{
    const devs=devices.filter(d=>d.source===src);
    const rev=sales.filter(s=>devs.find(d=>d.id===s.deviceId)).reduce((a,s)=>a+(+s.salePrice||0),0);
    const cost=devs.reduce((a,d)=>a+(+d.totalCost||0),0);
    return{src,count:devs.length,rev,cost,profit:rev-cost};
  }).sort((a,b)=>b.profit-a.profit);

  document.getElementById('content').innerHTML=`
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">📥 Total Received</div><div class="stat-value">${devices.length}</div><div class="stat-sub">All time</div></div>
    <div class="stat-card"><div class="stat-label">🔍 In Inspection</div><div class="stat-value" style="color:var(--primary)">${byStatus('Inspection Queue')}</div><div class="stat-sub">Awaiting inspection</div></div>
    <div class="stat-card"><div class="stat-label">🔧 In Repair</div><div class="stat-value" style="color:var(--warning)">${byStatus('In Repair')}</div><div class="stat-sub">+ ${byStatus('Reinspection Queue')} reinspection</div></div>
    <div class="stat-card"><div class="stat-label">✅ Ready for Sale</div><div class="stat-value" style="color:var(--success)">${byStatus('Ready for Sale')}</div><div class="stat-sub">${byStatus('For Parts')} for parts</div></div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">💰 Total Revenue</div><div class="stat-value" style="color:var(--success)">${fmt.money(totalRevenue)}</div><div class="stat-sub">${sales.length} sales</div></div>
    <div class="stat-card"><div class="stat-label">📦 Inventory Cost</div><div class="stat-value">${fmt.money(totalCost)}</div><div class="stat-sub">All devices</div></div>
    <div class="stat-card"><div class="stat-label">🔧 Total Repair Cost</div><div class="stat-value" style="color:var(--warning)">${fmt.money(repairCost)}</div><div class="stat-sub">Avg ${fmt.money(avgRepairCost)}/device</div></div>
    <div class="stat-card"><div class="stat-label">📈 Gross Profit</div><div class="stat-value ${grossProfit>=0?'profit-pos':'profit-neg'}">${fmt.money(grossProfit)}</div><div class="stat-sub">${soldDevices.length} sold</div></div>
  </div>
  <div class="grid-2 mb">
    <div class="card">
      <div class="card-title">Device Status Breakdown</div>
      <div class="chart-wrap"><canvas id="status-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Source Profitability</div>
      ${sourceData.length===0?'<div class="empty"><p>No data yet</p></div>':
      `<div class="tbl-wrap"><table><thead><tr><th>Source</th><th>Devices</th><th>Revenue</th><th>Profit</th></tr></thead><tbody>
      ${sourceData.map(s=>`<tr>
        <td><strong>${s.src}</strong></td><td>${s.count}</td>
        <td>${fmt.money(s.rev)}</td>
        <td class="${s.profit>=0?'profit-pos':'profit-neg'}">${fmt.money(s.profit)}</td>
      </tr>`).join('')}</tbody></table></div>`}
    </div>
  </div>
  <div class="card">
    <div class="card-title">Aging — Devices by Stage (Days in Current Status)</div>
    ${devices.length===0?'<div class="empty"><p>No devices yet</p></div>':
    `<div class="tbl-wrap"><table>
      <thead><tr><th>Device</th><th>Brand/Model</th><th>Source</th><th>Status</th><th>Days in Stage</th><th>Action</th></tr></thead>
      <tbody>${devices.filter(d=>d.status!=='Sold').sort((a,b)=>new Date(a.receivedAt)-new Date(b.receivedAt)).map(d=>{
        const days=Math.floor((Date.now()-new Date(d.receivedAt))/(86400000));
        return`<tr>
          <td style="font-family:monospace;font-size:11px">${d.id}</td>
          <td><strong>${d.brand} ${d.model}</strong></td>
          <td>${d.source}</td>
          <td>${statusBadge(d.status)}</td>
          <td><span style="color:${days>14?'#dc2626':days>7?'#d97706':'#16a34a'};font-weight:700">${days}d</span></td>
          <td><button class="btn btn-sm btn-ghost" onclick="viewDevice('${d.id}')">History</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`}
  </div>`;
  setTimeout(()=>{
    const ctx=document.getElementById('status-chart');if(!ctx)return;
    const statuses=['Inspection Queue','In Repair','Reinspection Queue','Ready for Sale','For Parts','Sold'];
    const colors=['#1a56db','#d97706','#7c3aed','#16a34a','#64748b','#0f766e'];
    const data=statuses.map(s=>devices.filter(d=>d.status===s).length);
    new Chart(ctx,{type:'doughnut',data:{labels:statuses,datasets:[{data,backgroundColor:colors,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right'}}}});
  },60);
}

function onSourceChange(){
  const sel=document.getElementById('rf-source');
  const customInput=document.getElementById('rf-source-custom');
  const citFields=document.getElementById('cit-fields');
  const citBanner=document.getElementById('cit-banner');
  if(!sel)return;
  const val=sel.value;
  customInput.style.display=val==='__custom__'?'block':'none';
  const isCIT=val==='CIT';
  citFields.style.display=isCIT?'block':'none';
  citBanner.style.display=isCIT?'flex':'none';
}

function onCategoryChange(){
  const cat=document.getElementById('rf-cat');if(!cat)return;
  const subcatWrap=document.getElementById('subcat-wrap');
  subcatWrap.style.display=cat.value==='Computer'?'block':'none';
  onBrandChange();
}

function onBrandChange(){
  const brand=document.getElementById('rf-brand');
  const cat=document.getElementById('rf-cat');
  const dl=document.getElementById('rf-model-list');
  if(!brand||!cat||!dl)return;
  const models=(MODELS[brand.value]||{})[cat.value]||['Other'];
  dl.innerHTML=models.map(m=>`<option value="${m}">`).join('');
}

function toggleNoSerial(){
  const cb=document.getElementById('rf-noserial');
  const inp=document.getElementById('rf-serial');
  const info=document.getElementById('rf-serial-info');
  if(cb.checked){
    inp.disabled=true;inp.placeholder='';
    info.textContent='A temporary serial number will be auto-generated and can be edited later.';
  } else {
    inp.disabled=false;inp.placeholder='Enter serial number';info.textContent='';
  }
}

function toggleAcc(el){
  el.closest('.check-item').classList.toggle('checked',el.checked);
}

function getSelectedAccessories(){
  return Array.from(document.querySelectorAll('#acc-group input:checked')).map(c=>c.value);
}

function getAutoSerial(){
  return'AUTO-'+Date.now().toString().slice(-8);
}

function getSource(){
  const sel=document.getElementById('rf-source');
  const custom=document.getElementById('rf-source-custom');
  if(sel.value==='__custom__')return custom.value.trim();
  return sel.value;
}

function saveDevice(){
  const source=getSource();
  if(!source){toast('Select a source/customer','error');return;}
  const isCIT=source==='CIT';
  if(isCIT){
    const eu=document.getElementById('rf-enduser').value.trim();
    const cn=document.getElementById('rf-contract').value.trim();
    if(!eu||!cn){toast('CIT requires End User & Contract Number','error');return;}
  }
  const noSerial=document.getElementById('rf-noserial').checked;
  const serialInput=document.getElementById('rf-serial').value.trim();
  let serial=noSerial?getAutoSerial():(serialInput||getAutoSerial());
  const isAutoSerial=noSerial||!serialInput;

  // Duplicate serial check
  if(!isAutoSerial){
    const dup=DB.all('devices').find(d=>d.serial===serial&&!d.serial.startsWith('AUTO-'));
    if(dup){toast('⚠️ Duplicate serial number! Device '+dup.id+' already has this serial.','warn');return;}
  }

  const cat=document.getElementById('rf-cat').value;
  const brand=document.getElementById('rf-brand').value;
  const model=''; // Model set by inspector in Inspection Queue
  const date=document.getElementById('rf-date').value;
  const employee=getSetting('employee');

  const device={
    id:DB.newId('DEV'),
    source,
    citEndUser:isCIT?(document.getElementById('rf-enduser').value.trim()):'',
    citContract:isCIT?(document.getElementById('rf-contract').value.trim()):'',
    category:cat,
    subCategory:cat==='Computer'?document.getElementById('rf-subcat').value:'',
    brand,model,serial,isAutoSerial,
    receivingDate:date,
    condition:document.getElementById('rf-condition').value,
    accessories:getSelectedAccessories(),
    notes:document.getElementById('rf-notes').value.trim(),
    receivedBy:employee,
    receivedAt:new Date().toISOString(),
    status:'Inspection Queue',
    totalCost:0,salePrice:0,
    laborAdded:false
  };

  DB.save('devices',device);
  logEvent(device.id,'Received','Source: '+source+' | Condition: '+device.condition+' | Serial: '+serial,employee,'blue');

  // Save batch state for next device
  lastBatch={source,citEndUser:device.citEndUser,citContract:device.citContract,date,employeeName:employee};

  closeModal();
  updateBadges();
  toast('Device '+device.id+' received → Inspection Queue');

  // Offer label print then reopen form
  modal(`<div class="overlay"><div class="modal" style="width:420px" onclick="event.stopPropagation()">
    <div class="modal-hdr"><h3>✓ Device Received</h3><button class="modal-close" onclick="closeModal();openReceptionForm()">×</button></div>
    <div class="alert alert-success">📦 <strong>${brand} ${model}</strong> added to Inspection Queue<br><span style="font-size:11px">ID: ${device.id} · SN: ${serial}</span></div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="printLabel('${device.id}');openReceptionForm()">🖨 Print Label & Next</button>
      <button class="btn btn-primary" onclick="closeModal();openReceptionForm()">+ Receive Next Device</button>
    </div>
  </div></div>`);
}

function renderInspection(){

function deviceCardHTML(d,stage){
  const editBtn=`<button class="btn btn-primary btn-sm" onclick="openDeviceEditForm('${d.id}')">✏️ Edit Device Info</button>`;
  const buttons={
    inspection:`
      ${editBtn}
      <button class="btn btn-success btn-sm" onclick="inspectDevice('${d.id}','sale')">✅ Ready for Sale</button>
      <button class="btn btn-warning btn-sm" onclick="inspectDevice('${d.id}','repair')">🔧 Send to Repair</button>
      <button class="btn btn-secondary btn-sm" onclick="inspectDevice('${d.id}','parts')">🔩 For Parts</button>
      <button class="btn btn-ghost btn-sm" onclick="viewDevice('${d.id}')">History</button>
      <button class="btn btn-ghost btn-sm" onclick="printLabel('${d.id}')">🏷 Label</button>`,
    repair:`
      ${editBtn}
      <button class="btn btn-primary btn-sm" onclick="openRepairForm('${d.id}')">🔧 Add Repair / Complete</button>
      <button class="btn btn-ghost btn-sm" onclick="viewDevice('${d.id}')">History</button>`,
    reinspection:`
      ${editBtn}
      <button class="btn btn-success btn-sm" onclick="reinspectDevice('${d.id}','sale')">✅ Approve for Sale</button>
      <button class="btn btn-warning btn-sm" onclick="reinspectDevice('${d.id}','repair')">🔧 Back to Repair</button>
      <button class="btn btn-secondary btn-sm" onclick="reinspectDevice('${d.id}','parts')">🔩 For Parts</button>
      <button class="btn btn-ghost btn-sm" onclick="viewDevice('${d.id}')">History</button>`
  };
  const repairs=DB.all('repairs').filter(r=>r.deviceId===d.id);
  const repairCost=repairs.reduce((a,r)=>a+(r.parts||[]).reduce((s,p)=>s+(+p.cost||0),0)+(r.laborCostAdded?25:0),0);
  // Build specs line
  const specParts=[];
  if(d.screenSize)specParts.push(d.screenSize);
  if(d.processor)specParts.push(d.processor);
  if(d.ram)specParts.push(d.ram+' RAM');
  if(d.storage)specParts.push(d.storage);
  const specsLine=specParts.length?`<div style="font-size:11px;color:var(--primary);margin-top:3px;font-weight:500">💾 ${specParts.join(' · ')}</div>`:'';
  return`<div class="device-card">
    <div class="device-card-hdr">
      <div>
        <div class="device-name">${d.brand} ${d.model} <span style="font-size:11px;color:var(--muted);font-weight:400">${d.category}${d.subCategory?' · '+d.subCategory:''}</span></div>
        <div class="device-meta">SN: <strong>${d.serial}</strong>${d.isAutoSerial?' <span class="badge bg-yellow" style="font-size:9px">AUTO</span>':''} · Source: <strong>${d.source}</strong>${d.citEndUser?' · '+d.citEndUser:''} · Received: ${fmt.date(d.receivingDate)} by ${d.receivedBy}</div>
        <div style="margin-top:4px">${statusBadge(d.status)} <span class="badge bg-gray" style="margin-left:4px">${d.condition}</span>${(d.accessories||[]).length?'<span style="font-size:11px;color:var(--muted);margin-left:8px">Acc: '+(d.accessories||[]).join(', ')+'</span>':''}</div>
        ${specsLine}
      </div>
      <div style="text-align:right;font-size:12px;color:var(--muted)">
        <div>Cost: <strong>${fmt.money(d.totalCost)}</strong></div>
        ${repairCost?`<div style="color:var(--warning)">Repair: ${fmt.money(repairCost)}</div>`:''}
        <div style="font-size:10px;margin-top:2px">${d.id}</div>
      </div>
    </div>
    ${d.notes?`<div style="font-size:12px;color:var(--muted);margin-top:6px;background:#f8fafc;padding:6px 8px;border-radius:4px">📝 ${d.notes}</div>`:''}
    <div class="device-actions">${(buttons[stage]||'')}</div>
  </div>`;
}

function saveDeviceEdit(deviceId){
  const d=DB.find('devices',deviceId);if(!d)return;
  const source=document.getElementById('ed-source').value;
  if(!source){toast('Source required','error');return;}
  const serial=(document.getElementById('ed-serial').value||'').trim();
  if(!serial){toast('Serial number required','error');return;}
  // Duplicate serial check (excluding self)
  if(!serial.startsWith('AUTO-')){
    const dup=DB.all('devices').find(x=>x.serial===serial&&x.id!==deviceId);
    if(dup){toast('⚠️ Duplicate serial — device '+dup.id+' already has this serial.','warn');return;}
  }
  const isCIT=source==='CIT';
  if(isCIT){
    const eu=(document.getElementById('ed-enduser').value||'').trim();
    const cn=(document.getElementById('ed-contract').value||'').trim();
    if(!eu||!cn){toast('CIT requires End User & Contract Number','error');return;}
    d.citEndUser=eu;d.citContract=cn;
  } else {d.citEndUser='';d.citContract='';}
  const cat=document.getElementById('ed-cat').value;
  const brand=document.getElementById('ed-brand').value;
  const model=document.getElementById('ed-model').value;
  d.source=source;
  d.receivingDate=document.getElementById('ed-date').value;
  d.category=cat;
  d.subCategory=cat==='Computer'?(document.getElementById('ed-subcat')||{value:''}).value:'';
  d.brand=brand;d.model=model;d.serial=serial;
  d.isAutoSerial=serial.startsWith('AUTO-');
  d.condition=document.getElementById('ed-condition').value;
  d.accessories=Array.from(document.querySelectorAll('#ed-acc-group input:checked')).map(el=>el.value);
  d.notes=(document.getElementById('ed-notes').value||'').trim();
  // Specs
  const sEl=document.getElementById('ed-size');
  const pEl=document.getElementById('ed-processor');
  const rEl=document.getElementById('ed-ram');
  const stEl=document.getElementById('ed-storage');
  if(sEl)d.screenSize=sEl.value; else d.screenSize='';
  if(pEl)d.processor=pEl.value; else d.processor='';
  if(rEl)d.ram=rEl.value; else d.ram='';
  if(stEl)d.storage=stEl.value; else d.storage='';
  const costEl=document.getElementById('ed-cost');
  if(costEl)d.totalCost=parseFloat(costEl.value)||0;
  DB.save('devices',d);
  logEvent(deviceId,'Device Info Updated',`${brand} ${model} | SN: ${serial}${d.processor?' | '+d.processor:''}${d.ram?' · '+d.ram:''}${d.storage?' · '+d.storage:''}`,getSetting('employee'),'blue');
  closeModal();toast('Device info saved ✓');
  // Refresh whatever page is showing
  if(currentPage==='inspection')renderInspection();
  else if(currentPage==='repair')renderRepair();
  else if(currentPage==='reinspection')renderReinspection();
  else if(currentPage==='history'){const s=document.getElementById('hist-search');if(s&&s.value)searchHistory();}
}

function saveRepair(deviceId,laborAlreadyAdded){
  const notes=document.getElementById('rep-notes').value.trim();
  if(!notes){toast('Problem description is required','error');return;}
  const employee=getSetting('employee');
  const parts=[];let partsCost=0;

  // Collect all part rows
  let partError=false;
  document.querySelectorAll('#rep-part-rows > div[id^="rprow-"]').forEach(row=>{
    const n=row.id.replace('rprow-','');
    const srcType=(document.getElementById('rpsrctype-'+n)||{}).value||'external';
    if(srcType==='external'){
      const name=(document.getElementById('rpname-'+n)||{value:''}).value.trim();
      if(!name)return; // skip empty rows
      const supplier=(document.getElementById('rpsupplier-'+n)||{value:'Other'}).value;
      const cost=parseFloat((document.getElementById('rpcost-'+n)||{value:'0'}).value)||0;
      parts.push({name,source:supplier,sourceType:'external',cost});
      partsCost+=cost;
    } else {
      const sel=document.getElementById('rpinv-'+n);
      if(!sel||!sel.value){partError=true;return;}
      const invPart=DB.find('parts',sel.value);
      if(!invPart){partError=true;return;}
      const cost=parseFloat(invPart.unitCost)||0;
      parts.push({name:invPart.name,source:'Internal Inventory',sourceType:'internal',invPartId:invPart.id,cost});
      partsCost+=cost;
      // Deduct from inventory
      invPart.qty=Math.max(0,(+invPart.qty||1)-1);
      if(invPart.qty===0)invPart.status='Used Up';
      DB.save('parts',invPart);
    }
  });
  if(partError){toast('Please select a part from inventory for each internal part row','error');return;}

  const laborCost=laborAlreadyAdded?0:25;
  const repair={id:DB.newId('REP'),deviceId,notes,parts,laborCostAdded:!laborAlreadyAdded,laborCost,partsCost,repairedBy:employee,completedAt:new Date().toISOString()};
  DB.save('repairs',repair);
  const d=DB.find('devices',deviceId);
  d.status='Reinspection Queue';
  d.totalCost=(+d.totalCost||0)+partsCost+laborCost;
  d.laborAdded=true;
  DB.save('devices',d);
  const partsDesc=parts.length?` | Parts (${parts.length}): ${parts.map(p=>p.name+' '+fmt.money(p.cost)).join(', ')}`:'';
  const detail=`Labor: ${fmt.money(laborCost)} | Parts Total: ${fmt.money(partsCost)} | Problem: ${notes}${partsDesc}`;
  logEvent(deviceId,'Repair Complete',detail,employee,'orange');
  closeModal();toast('Repair saved → Reinspection Queue');updateBadges();renderRepair();
}

function completeSale(deviceId){
  const price=parseFloat(document.getElementById('sf-price').value)||0;
  const employee=getSetting('employee');
  const d=DB.find('devices',deviceId);

  const employee=getSetting('employee');

function scanBarHTML(){

// ── Camera barcode scanner ─────────────────────────────────────────────────
let _camScanner = null;

function openCameraScanner(){
  if(document.getElementById('cam-scan-modal')) return;
  const modal = document.createElement('div');
  modal.id = 'cam-scan-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:8500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px';
  modal.innerHTML = `
    <div style="color:#fff;font-size:17px;font-weight:700;margin-bottom:4px">Scan Barcode</div>
    <div style="color:#94a3b8;font-size:13px;margin-bottom:8px;text-align:center">Point the camera at the barcode on the device label</div>
    <div id="cam-reader" style="width:min(320px,90vw);border-radius:12px;overflow:hidden;background:#000;border:2px solid #1a56db"></div>
    <button onclick="closeCameraScanner()" style="margin-top:8px;background:#334155;color:#fff;border:none;border-radius:8px;padding:10px 28px;font-size:15px;cursor:pointer">Cancel</button>
  `;
  document.body.appendChild(modal);

  const scanner = new Html5Qrcode('cam-reader');
  _camScanner = scanner;
  scanner.start(
    {facingMode:'environment'},
    {fps:12, qrbox:{width:240,height:90}, aspectRatio:1.0},
    (code)=>{ closeCameraScanner(); handleScan(code); },
    ()=>{}
  ).catch(err=>{
    closeCameraScanner();
    toast('Camera unavailable: '+err,'error');
  });
}

function closeCameraScanner(){
  if(_camScanner){_camScanner.stop().catch(()=>{});_camScanner=null;}
  const el=document.getElementById('cam-scan-modal');
  if(el)el.remove();
}

function handleScan(val){
  val=(val||'').trim();
  if(!val)return;
  const devices=DB.all('devices');
  const found=devices.find(d=>
    d.id.toLowerCase()===val.toLowerCase()||
    (!d.isAutoSerial&&d.serial.toLowerCase()===val.toLowerCase())
  );
  if(!found){toast('No device found for: "'+val+'"','error');return;}
  showScanModal(found.id);
}

function showScanModal(deviceId){
  const d=DB.find('devices',deviceId);if(!d)return;
  const history=getHistory(deviceId);
  const repairs=DB.all('repairs').filter(r=>r.deviceId===deviceId);
  const sale=DB.all('sales').find(s=>s.deviceId===deviceId);
  const dotColor={blue:'tl-dot-blue',green:'tl-dot-green',orange:'tl-dot-orange',red:'tl-dot-red',purple:'tl-dot-purple',gray:'tl-dot-gray',teal:'tl-dot-green'};
  const specs=[d.screenSize,d.processor,d.ram&&d.ram+' RAM',d.storage].filter(Boolean).join(' · ');

  // Quick action button based on current status
  let actionBtn='';
  if(d.status==='Inspection Queue')actionBtn=`<button class="btn btn-primary btn-sm" onclick="closeModal();nav('inspection')">→ Go to Inspection</button>`;
  else if(d.status==='In Repair')actionBtn=`<button class="btn btn-warning btn-sm" onclick="closeModal();nav('repair')">→ Go to Repair</button>`;
  else if(d.status==='Reinspection Queue')actionBtn=`<button class="btn btn-secondary btn-sm" onclick="closeModal();nav('reinspection')">→ Go to Reinspection</button>`;
  else if(d.status==='Ready for Sale')actionBtn=`<button class="btn btn-success btn-sm" onclick="closeModal();nav('sale')">→ Go to Sale</button>`;

  modal(`<div class="overlay" onclick="closeModal()"><div class="modal modal-lg" onclick="event.stopPropagation()" style="max-height:92vh">
    <div class="modal-hdr">
      <div>
        <h3 style="font-size:16px">${d.brand}${d.model?' '+d.model:''} <span style="font-size:12px;font-weight:400;color:var(--muted)">${d.category}${d.subCategory?' · '+d.subCategory:''}</span></h3>
        <div style="margin-top:3px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          ${statusBadge(d.status)}
          <span class="badge bg-gray">${d.condition}</span>
          <span style="font-size:11px;color:var(--muted);font-family:monospace">${d.id}</span>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>

    <div class="info-grid" style="margin-bottom:14px">
      <div class="info-item"><div class="il">Serial</div><div class="iv" style="font-family:monospace">${d.isAutoSerial?'—':d.serial}</div></div>
      <div class="info-item"><div class="il">Source</div><div class="iv">${d.source}${d.citEndUser?' — '+d.citEndUser:''}${d.citContract?' #'+d.citContract:''}</div></div>
      <div class="info-item"><div class="il">Received</div><div class="iv">${fmt.date(d.receivingDate)} by ${d.receivedBy}</div></div>
      <div class="info-item"><div class="il">Total Cost</div><div class="iv">${fmt.money(d.totalCost)}</div></div>
      ${d.salePrice?`<div class="info-item"><div class="il">Sale Price</div><div class="iv" style="color:var(--success);font-weight:700">${fmt.money(d.salePrice)}</div></div>`:''}
      ${sale?`<div class="info-item"><div class="il">Profit</div><div class="iv ${(+sale.profit||0)>=0?'profit-pos':'profit-neg'}">${fmt.money(sale.profit)}</div></div>`:''}
      ${(d.accessories||[]).length?`<div class="info-item"><div class="il">Accessories</div><div class="iv">${d.accessories.join(', ')}</div></div>`:''}
      ${specs?`<div class="info-item" style="grid-column:1/-1"><div class="il">Specs</div><div class="iv" style="color:var(--primary)">${specs}</div></div>`:''}
    </div>

    <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Device Timeline</div>
    <div class="timeline">
      ${history.map(ev=>`<div class="tl-item">
        <div class="tl-dot ${dotColor[ev.color]||'tl-dot-blue'}"></div>
        <div class="tl-event">${ev.event}</div>
        <div class="tl-detail">${ev.details||''}</div>
        <div class="tl-time">${fmt.datetime(ev.timestamp)} · ${ev.employee}</div>
      </div>`).join('')||'<div style="color:var(--muted);font-size:13px">No history yet.</div>'}
    </div>

    <div class="form-actions" style="margin-top:14px">
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>

function searchHistory(){
  const q=document.getElementById('hist-search').value.trim().toLowerCase();
  if(!q)return;
  const devices=DB.all('devices');
  const found=devices.filter(d=>d.id.toLowerCase()===q||d.serial.toLowerCase().includes(q)||d.serial.toLowerCase()===q);
  const el=document.getElementById('hist-result');
  if(!found.length){el.innerHTML=`<div class="alert alert-warning">No device found for "${q}"</div>`;return;}
  el.innerHTML=found.map(d=>renderDeviceDetail(d)).join('');
  // Draw barcodes
  found.forEach(d=>{
    setTimeout(()=>{
      try{JsBarcode('#bc-'+d.id,d.id,{format:'CODE128',width:1.5,height:40,displayValue:true,fontSize:12});}catch(e){}
    },60);
  });
}

function openEmployeeForm(id){
  const e=id?DB.find('employees',id):{};
  const roles=['Admin','Receptionist','Inspector','Technician'];
  modal(`<div class="overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <h3>${id?'Edit Employee':'Add Employee'}</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="fg"><label>Full Name *</label><input id="ef-name" value="${e.name||''}" placeholder="e.g. John Smith"></div>
    <div class="fg"><label>Role *</label>
      <select id="ef-role">
        ${roles.map(r=>`<option value="${r}" ${(e.role||'Receptionist')===r?'selected':''}>${r}</option>`).join('')}
      </select>
    </div>
    ${!id?`<div class="fg"><label>4-Digit PIN *</label>
      <input id="ef-pin" type="password" maxlength="4" placeholder="••••" inputmode="numeric">
      <div style="font-size:11px;color:var(--muted);margin-top:3px">Employee uses this PIN to log in each session.</div>
    </div>`:''}
    <div class="fg"><label>Status</label>
      <select id="ef-active">
        <option value="true" ${e.active!==false?'selected':''}>Active</option>
        <option value="false" ${e.active===false?'selected':''}>Inactive</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEmployee('${id||''}')">Save Employee</button>
    </div>
  </div></div>`);
}

function saveEmployee(id){
  const name=(document.getElementById('ef-name').value||'').trim();
  if(!name){toast('Name required','error');return;}
  const role=document.getElementById('ef-role').value;
  const active=document.getElementById('ef-active').value==='true';
  let emp;
  if(id){
    emp=DB.find('employees',id);
    emp.name=name;emp.role=role;emp.active=active;
  } else {
    const pin=(document.getElementById('ef-pin').value||'').trim();
    if(pin.length!==4||!/^\d+$/.test(pin)){toast('PIN must be exactly 4 digits','error');return;}
    emp={id:DB.newId('EMP'),name,role,pin,active,createdAt:new Date().toISOString()};
  }
  DB.save('employees',emp);
  const sess=getSession();
  if(sess&&sess.id===emp.id){setSession(emp);applyRoleNav(emp.role);}
  closeModal();toast('Employee saved');renderEmployees();
}

function resetEmployeePin(id){
  const e=DB.find('employees',id);if(!e)return;
  modal(`<div class="overlay" onclick="closeModal()"><div class="modal" style="width:380px" onclick="event.stopPropagation()">
    <div class="modal-hdr"><h3>🔑 Change PIN — ${e.name}</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="fg"><label>New 4-Digit PIN *</label>
      <input id="rp-pin" type="password" maxlength="4" placeholder="••••" inputmode="numeric" autofocus>
    </div>
    <div class="fg"><label>Confirm PIN *</label>
      <input id="rp-pin2" type="password" maxlength="4" placeholder="••••" inputmode="numeric">
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="
        const p1=(document.getElementById('rp-pin').value||'').trim();
        const p2=(document.getElementById('rp-pin2').value||'').trim();
        if(p1.length!==4||!/^\\d+$/.test(p1)){toast('PIN must be 4 digits','error');return;}
        if(p1!==p2){toast('PINs do not match','error');return;}
        const emp=DB.find('employees','${e.id}');emp.pin=p1;DB.save('employees',emp);
        closeModal();toast('PIN updated for '+emp.name);
      ">Update PIN</button>
    </div>
  </div></div>`);
}

function deleteEmployee(id){
  const sess=getSession();
  if(sess&&sess.id===id){toast('Cannot delete your own account while logged in','error');return;}
  confirm2('Delete this employee? They will no longer be able to log in.',()=>{
    DB.del('employees',id);toast('Employee deleted');renderEmployees();
  });
}

function exportSalesCSV(){
  const sales=DB.all('sales');
  const headers=['Sale ID','Device ID','Brand','Model','Serial','Source','Channel','Cost','Sale Price','Profit','Buyer','Sale Date','Sold By'];
  const rows=sales.map(s=>{const d=DB.find('devices',s.deviceId)||{};return[s.id,s.deviceId,d.brand||'',d.model||'',d.serial||'',d.source||'',s.channel,s.cost,s.salePrice,s.profit,s.buyer||'',s.saleDate,s.soldBy].map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',');});
  const csv=[headers.join(','),...rows].join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='ITAD-Sales-'+new Date().toISOString().split('T')[0]+'.csv';a.click();
  toast('Sales CSV exported');
}

function clearAllData(){

    ['devices','repairs','inspections','reinspections','sales','parts','history','customers'].forEach(k=>DB.set(k,[]));

}

// Global barcode scanner listener (USB HID scanners type fast + Enter)
(function(){
  let buf='',timer=null;
  document.addEventListener('keydown',function(e){
    const tag=(document.activeElement||{}).tagName||'';
    // If user is typing in any input/select/textarea, let it pass through normally
    // EXCEPT our dedicated scan-bar which handles its own Enter
    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'){
      // If the focused input IS the scan-bar, it handles itself; skip global handler
      return;
    }
    if(e.key==='Enter'){
      if(buf.length>3){handleScan(buf);}
      buf='';if(timer)clearTimeout(timer);
      return;
    }
    if(e.key.length===1){
      buf+=e.key;
      if(timer)clearTimeout(timer);
      // Scanner sends all chars within ~100ms; reset buffer if no new char in 200ms
      timer=setTimeout(()=>{buf='';},200);
    }
  });
})();


// Login on load
// ── App startup (async — loads Supabase data first) ──────────────────────
(async function startApp(){
  const loadingEl=document.getElementById('app-loading');
  try{
    await initSupabase();
  } catch(e){
    if(loadingEl){
      loadingEl.innerHTML=`<div style="text-align:center;padding:24px">
        <div style="font-size:36px;margin-bottom:12px">⚠️</div>
        <div style="color:#f87171;font-size:18px;font-weight:700;margin-bottom:8px">Cannot connect to database</div>
        <div style="color:#94a3b8;font-size:13px;max-width:320px;margin:0 auto">
          Check that SUPABASE_URL and SUPABASE_ANON_KEY are correctly set in the HTML file.<br><br>
          <code style="background:#1e293b;padding:4px 8px;border-radius:4px;font-size:11px">${e.message}</code>
        </div>
      </div>`;
    }
    console.error('Supabase init failed',e);
    return;
  }
  // Hide loading
  if(loadingEl) loadingEl.style.display='none';
  // Employee login flow
  const sess=getSession();
  const employees=DB.all('employees');
  if(!sess||!employees.find(e=>e.id===sess.id&&e.active!==false)){
    clearSession();
    showEmployeeLogin(true);
    nav('dashboard');
  } else {
    applyRoleNav(sess.role);
    const allowed=ROLE_PAGES[sess.role]||['dashboard'];
    nav(allowed[0]||'dashboard');
  }
})();
</script>
